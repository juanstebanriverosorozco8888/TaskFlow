{% extends 'layouts/admin_base.html' %}

{% block content %}

<div
    class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2>

            Crear tarea

        </h2>

        <p class="text-muted">

            Asigna tareas a los usuarios

        </p>

    </div>

</div>

<div
    class="card border-0 shadow-sm rounded-4">

    <div class="card-body p-4">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="mb-2">

                        Proyecto

                    </label>

                    <select
                        name="project_id"
                        class="form-select"
                        required>

                        <option value="">

                            Seleccionar proyecto

                        </option>

                        {% for project in projects %}

                        <option
                            value="{{ project.id }}">

                            {{ project.title }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="mb-2">

                        Usuario asignado

                    </label>

                    <select
                        name="assigned_to"
                        class="form-select"
                        required>

                        <option value="">

                            Seleccionar usuario

                        </option>

                        {% for user in users %}

                        <option
                            value="{{ user.uid }}">

                            {{ user.name }}
                            -
                            {{ user.email }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <div class="mb-3">

                <label class="mb-2">

                    Título

                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="mb-2">

                    Descripción

                </label>

                <textarea
                    name="description"
                    rows="4"
                    class="form-control"
                    required></textarea>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="mb-2">

                        Prioridad

                    </label>

                    <select
                        name="priority"
                        class="form-select">

                        <option>

                            Baja

                        </option>

                        <option>

                            Media

                        </option>

                        <option>

                            Alta

                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="mb-2">

                        Fecha límite

                    </label>

                    <input
                        type="date"
                        name="deadline"
                        class="form-control">

                </div>

            </div>

            <button
                class="btn btn-primary">

                Crear tarea

            </button>

        </form>

    </div>

</div>

{% endblock %}
