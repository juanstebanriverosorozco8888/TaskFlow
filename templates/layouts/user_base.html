{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>
        Panel Usuario
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body
    style="
    background:#f4f6fb;
    ">

<div class="d-flex">

    <div
        style="
        width:260px;
        min-height:100vh;
        background:#1f2937;
        ">

        <div class="p-4">

            <h4
                class="text-white">

                Mis Tareas

            </h4>

            <hr class="text-secondary">

            <a
                href="{% url 'user_dashboard' %}"
                class="btn w-100 text-start mb-2 text-white">

                Dashboard

            </a>

            <a
                href="{% url 'user_task_list' %}"
                class="btn w-100 text-start mb-2 text-white">

                Mis tareas

            </a>

            <a
                href="{% url 'user_weather' %}"
                class="btn w-100 text-start mb-2 text-white">

                Clima

            </a>

            <a
                href="{% url 'logout' %}"
                class="btn btn-danger w-100 mt-4">

                Cerrar sesión

            </a>

        </div>

    </div>

    <div class="flex-grow-1 p-4">

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>

</html>
