<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Admin Dashboard

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            font-family:
            'Inter',
            sans-serif;
        }

        body{

            margin:0;
            background:#f5f7fb;
        }

        .sidebar{

            width:270px;
            height:100vh;

            position:fixed;

            background:#0f172a;

            padding:30px 20px;

            color:white;
        }

        .logo{

            font-size:28px;
            font-weight:700;

            margin-bottom:40px;
        }

        .menu-title{

            color:#94a3b8;
            font-size:13px;
            margin-bottom:15px;
            text-transform:uppercase;
        }

        .sidebar a{

            display:flex;

            align-items:center;

            text-decoration:none;

            color:#cbd5e1;

            padding:14px 18px;

            border-radius:14px;

            margin-bottom:10px;

            transition:0.3s;
        }

        .sidebar a:hover{

            background:#1e293b;

            color:white;
        }

        .main{

            margin-left:270px;
            padding:40px;
        }

        .top-card{

            background:white;

            border-radius:22px;

            padding:30px;

            box-shadow:
            0 5px 20px rgba(
                0,0,0,0.05
            );

            margin-bottom:30px;
        }

        .dashboard-card{

            background:white;

            border-radius:20px;

            padding:25px;

            box-shadow:
            0 5px 15px rgba(
                0,0,0,0.05
            );

            transition:0.3s;
        }

        .dashboard-card:hover{

            transform:
            translateY(-5px);
        }

        .dashboard-number{

            font-size:34px;
            font-weight:700;
        }

        .dashboard-label{

            color:#64748b;
        }

        .btn-custom{

            background:#2563eb;
            color:white;
            border:none;

            border-radius:14px;

            padding:
            10px 20px;
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <div class="logo">

            TaskFlow

        </div>

        <div class="menu-title">

            Administración

        </div>

        <a href="{% url 'home_dashboard' %}">

            Dashboard

        </a>

        <a href="{% url 'project_list' %}">

            Proyectos

        </a>

        <a href="{% url 'task_list' %}">

            Tareas

        </a>

        <a href="{% url 'user_list' %}" class="nav-link">

            Usuarios

        </a>

        <a href="{% url 'weather' %}">

            Clima

        </a>

        <hr class="text-secondary">

        <a href="{% url 'logout' %}">

            Cerrar sesión

        </a>

    </div>

    <div class="main">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
