<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        Gestor de tareas
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family:
            'Inter',
            sans-serif;
        }

        body {

            background:
                #f4f7fc;

            min-height:
                100vh;
        }

        .app-navbar{
            background:#0f172a;
            padding:14px 0;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }

        .app-navbar .navbar-brand{
            color:white;
            font-size:1.5rem;
        }

        .app-navbar .navbar-brand:hover{
            color:white;
        }

        .auth-wrapper {
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fb;
        }

        .auth-card {
            width: 100%;
            max-width: 470px;
            background: #fff;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, .08);
        }

        .logo-title {
            font-size: 34px;
            font-weight: 700;
            color: #0f172a;
        }

        .subtitle {
            color: #6b7280;
            margin-top: 8px;
        }

        .form-control,
        .form-select {
            height: 50px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 .2rem rgba(37, 99, 235, .15);
        }

        .btn-primary-custom {
            background: #0f172a;
            color: #fff;
            border: none;
            border-radius: 10px;
            height: 50px;
            font-weight: 600;
            transition: .25s;
        }

        .btn-primary-custom:hover {
            background: #0f172a;
        }

        .auth-link {
            color: #0f172a;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-link:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">

        <div class="container">

            <a class="navbar-brand" href="{% url 'home_dashboard' %}">

                Gestor Tareas

            </a>

        </div>

    </nav>

    <div class="container mt-5">

        {% if messages %}

        {% for message in messages %}

        <div class="alert alert-info">

            {{ message }}

        </div>

        {% endfor %}

        {% endif %}

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
