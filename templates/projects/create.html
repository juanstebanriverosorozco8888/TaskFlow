{% extends 'layouts/admin_base.html' %}

{% block content %}

<div
    class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2>

            Crear Proyecto

        </h2>

        <p
            class="text-muted">

            Crea un nuevo proyecto para gestionar tareas

        </p>

    </div>

</div>

<div
    class="card border-0 shadow-sm rounded-4">

    <div
        class="card-body p-4 p-lg-5">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label
                    class="form-label fw-semibold mb-2">

                    Nombre del proyecto

                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control custom-input"
                    placeholder="Ej: Sistema de Gestión"
                    required>

            </div>

            <div class="mb-4">

                <label
                    class="form-label fw-semibold mb-2">

                    Descripción

                </label>

                <textarea
                    name="description"
                    rows="5"
                    class="form-control custom-input"
                    placeholder="Describe el proyecto"></textarea>

            </div>

            <div class="mb-4">

                <label
                    class="form-label fw-semibold mb-2">

                    Estado del proyecto

                </label>

                <select
                    name="status"
                    class="form-select custom-input">

                    <option value="Activo">

                        Activo

                    </option>

                    <option value="En pausa">

                        En pausa

                    </option>

                    <option value="Finalizado">

                        Finalizado

                    </option>

                </select>

            </div>

            <div
                class="d-flex gap-3">

                <button
                    class="btn btn-primary px-4 py-2 rounded-4">

                    Crear Proyecto

                </button>

                <a
                    href="{% url 'project_list' %}"
                    class="btn btn-light border px-4 py-2 rounded-4">

                    Cancelar

                </a>

            </div>

        </form>

    </div>

</div>

<style>

    .custom-input{

        border:
        1px solid #dbe2ea !important;

        border-radius:
        14px !important;

        min-height:
        52px;

        padding:
        12px 18px;

        transition:
        0.3s ease;
    }

    .custom-input:focus{

        border-color:
        #2563eb !important;

        box-shadow:
        0 0 0 4px rgba(
            37,
            99,
            235,
            0.12
        ) !important;
    }

</style>

{% endblock %}
